<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi primer despliegue</title>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .card {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      box-shadow: 0 0 40px #e94560aa;
    }
    h1 { color: #e94560; font-size: 2.5rem; margin-bottom: 16px; }
    p  { color: #a8b2d8; font-size: 1.2rem; }
    .badge {
      display: inline-block;
      margin-top: 24px;
      background: #0f3460;
      color: #e94560;
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 ¡IaC!</h1>
    <p>Mi primer código desplegado con</p>
    <p><strong style="color:white">Terraform + Docker + IaC</strong></p>
    
  </div>
</body>
</html>
